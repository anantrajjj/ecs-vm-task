events { worker_connections 1024; }

# Layer-4 router on port 80: sniffs the first bytes to detect TLS.
# Mobile Chrome sends a TLS ClientHello (HTTPS-first); plain browsers send HTTP.
# Both arrive on the same port (company firewall maps external 8089 → VM:80).
stream {
    map $ssl_preread_protocol $upstream {
        ""      http_backend;   # plain HTTP
        default https_backend;  # any TLS version
    }
    upstream http_backend  { server 127.0.0.1:8080; }
    upstream https_backend { server 127.0.0.1:8443; }
    server {
        listen 80;
        proxy_pass $upstream;
        ssl_preread on;
    }
}

http {
    log_format main '$remote_addr - [$time_local] "$request" $status $body_bytes_sent '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    gzip         on;
    gzip_proxied any;
    gzip_types   text/html text/plain application/javascript text/javascript text/css;
    gzip_min_length 1000;
    gzip_comp_level 6;
    gzip_vary    on;

    upstream app {
        server ecs-vm-demo:3000;
        keepalive 32;
    }

    # Shared proxy settings for both HTTP and HTTPS blocks
    proxy_http_version 1.1;
    proxy_buffering    on;
    proxy_set_header   Connection        "";
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Accept-Encoding   "";
    proxy_read_timeout    60s;
    proxy_connect_timeout 10s;

    # HTTP — receives plain connections from the stream router
    server {
        listen 8080;
        server_name _;
        add_header X-Frame-Options       SAMEORIGIN                      always;
        add_header X-Content-Type-Options nosniff                        always;
        add_header Referrer-Policy       strict-origin-when-cross-origin always;
        location / { proxy_pass http://app; }
    }

    # HTTPS — receives TLS connections from the stream router
    server {
        listen 8443 ssl;
        server_name _;
        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        add_header X-Frame-Options       SAMEORIGIN                      always;
        add_header X-Content-Type-Options nosniff                        always;
        add_header Referrer-Policy       strict-origin-when-cross-origin always;
        location / { proxy_pass http://app; }
    }
}
